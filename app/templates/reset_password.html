{% extends "base.html" %}

{% block title %}Health Advisor — Reset Password{% endblock %}

{% block content %}
<div class="auth-wrap">

    <!-- Blobs -->
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <!-- Top Controls -->
    <div class="top-controls">
        <button class="toggle-btn" onclick="toggleLanguage()">
            <span id="lang-label">AR</span>
        </button>
        <button class="toggle-btn" onclick="toggleTheme()">
            <i id="theme-icon" class="fa-solid fa-moon text-sm"></i>
        </button>
    </div>

    <!-- Card -->
    <div class="card auth-card anim-card-in">

        <!-- Back -->
        <a href="/forgot-password" class="back-link anim-fade-up delay-1">
            <i class="fa-solid fa-arrow-left rtl-flip"></i>
            <span data-i18n="common.back">Back</span>
        </a>

        <!-- Logo -->
        <div style="display:flex;justify-content:center;margin-bottom:20px" class="anim-logo-in">
            <div class="logo-ring">
                <i class="fa-solid fa-lock-open text-white" style="font-size:28px"></i>
            </div>
        </div>

        <!-- Title -->
        <h1 class="card-title anim-fade-up delay-2" style="text-align:center" data-i18n="reset.title">Reset Password
        </h1>
        <p class="card-subtitle anim-fade-up delay-3" style="text-align:center" data-i18n="reset.subtitle">
            Enter the code sent to your email and your new password
        </p>

        <!-- Email display -->
        <div class="anim-fade-up delay-3" style="display:flex;justify-content:center;margin-bottom:24px">
            <span id="email-display" style="
          display:inline-block;
          padding:6px 16px;
          border-radius:100px;
          font-size:13px;font-weight:600;
          color:var(--color-primary);
          background:rgba(127,94,152,0.08);
          border:1px solid var(--color-border);
        "></span>
        </div>

        <!-- Error -->
        <div id="error-msg" class="msg-error">
            <i class="fa-solid fa-circle-exclamation"></i>
            <span id="error-text"></span>
        </div>

        <!-- Success -->
        <div id="success-msg" class="msg-success">
            <i class="fa-solid fa-circle-check"></i>
            <span id="success-text"></span>
        </div>

        <!-- Form -->
        <form id="reset-form" novalidate>

            <!-- OTP Code -->
            <div class="field-group anim-fade-up delay-3">
                <label class="field-label" for="otp" data-i18n="reset.otp_label">Reset Code</label>
                <div class="field-wrap">
                    <i class="fa-solid fa-hashtag field-icon"></i>
                    <input id="otp" type="text" name="otp" class="field-input"
                        data-i18n-placeholder="reset.otp_placeholder" placeholder="Enter reset code" inputmode="numeric"
                        maxlength="6" autocomplete="one-time-code" required />
                </div>
            </div>

            <!-- New Password -->
            <div class="field-group anim-fade-up delay-4">
                <label class="field-label" for="new-password" data-i18n="reset.new_password">New Password</label>
                <div class="field-wrap">
                    <i class="fa-solid fa-lock field-icon"></i>
                    <input id="new-password" type="password" name="new_password" class="field-input has-toggle"
                        data-i18n-placeholder="reset.new_password_placeholder" placeholder="Enter new password"
                        autocomplete="new-password" required />
                    <button type="button" class="pw-toggle" id="pw-toggle-1" aria-label="Toggle password">
                        <i class="fa-solid fa-eye" id="pw-icon-1"></i>
                    </button>
                </div>
            </div>

            <!-- Confirm Password -->
            <div class="field-group anim-fade-up delay-4">
                <label class="field-label" for="confirm-password" data-i18n="reset.confirm_password">Confirm
                    Password</label>
                <div class="field-wrap">
                    <i class="fa-solid fa-lock field-icon"></i>
                    <input id="confirm-password" type="password" name="confirm_password" class="field-input has-toggle"
                        data-i18n-placeholder="reset.confirm_placeholder" placeholder="Confirm new password"
                        autocomplete="new-password" required />
                    <button type="button" class="pw-toggle" id="pw-toggle-2" aria-label="Toggle password">
                        <i class="fa-solid fa-eye" id="pw-icon-2"></i>
                    </button>
                </div>
            </div>

            <!-- Submit -->
            <button type="submit" class="btn-primary anim-fade-up delay-5" id="reset-btn" style="margin-top:8px">
                <span class="btn-text" data-i18n="reset.reset_btn">Reset Password</span>
                <div class="btn-spinner"></div>
            </button>

        </form>

    </div>

    <!-- Copyright -->
    <p class="page-copyright anim-fade-up delay-6" data-i18n="auth.copyright">
        © 2026 Health Advisor
    </p>

</div>
{% endblock %}

{% block scripts %}
<script>
    (function () {
        // ── Sync toggles ──
        const lang = localStorage.getItem('lang') || 'en';
        const theme = localStorage.getItem('theme') || 'light';
        const langLabel = document.getElementById('lang-label');
        const themeIcon = document.getElementById('theme-icon');
        if (langLabel) langLabel.textContent = lang === 'ar' ? 'EN' : 'AR';
        if (themeIcon) {
            themeIcon.classList.toggle('fa-moon', theme !== 'dark');
            themeIcon.classList.toggle('fa-sun', theme === 'dark');
        }

        // ── Get email from URL ──
        const params = new URLSearchParams(window.location.search);
        const email = params.get('email') || '';

        if (!email) {
            window.location.href = '/forgot-password';
            return;
        }

        document.getElementById('email-display').textContent = email;

        // ── Password toggles ──
        function setupToggle(btnId, inputId, iconId) {
            document.getElementById(btnId).addEventListener('click', () => {
                const input = document.getElementById(inputId);
                const icon = document.getElementById(iconId);
                const show = input.type === 'password';
                input.type = show ? 'text' : 'password';
                icon.classList.toggle('fa-eye', !show);
                icon.classList.toggle('fa-eye-slash', show);
            });
        }
        setupToggle('pw-toggle-1', 'new-password', 'pw-icon-1');
        setupToggle('pw-toggle-2', 'confirm-password', 'pw-icon-2');

        // ── Message helpers ──
        function showError(msg) {
            document.getElementById('success-msg').classList.remove('show');
            document.getElementById('error-text').textContent = msg;
            document.getElementById('error-msg').classList.add('show');
        }

        function showSuccess(msg) {
            document.getElementById('error-msg').classList.remove('show');
            document.getElementById('success-text').textContent = msg;
            document.getElementById('success-msg').classList.add('show');
        }

        function hideMessages() {
            document.getElementById('error-msg').classList.remove('show');
            document.getElementById('success-msg').classList.remove('show');
        }

        // ── Loading state ──
        function setLoading(state) {
            const btn = document.getElementById('reset-btn');
            btn.disabled = state;
            btn.classList.toggle('btn-loading', state);
        }

        // ── Form submit ──
        document.getElementById('reset-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            hideMessages();

            const otp = document.getElementById('otp').value.trim();
            const newPassword = document.getElementById('new-password').value;
            const confirm = document.getElementById('confirm-password').value;

            if (!otp) {
                showError(t('common.required'));
                return;
            }
            if (!newPassword || newPassword.length < 6) {
                showError(t('common.required'));
                return;
            }
            if (newPassword !== confirm) {
                showError(t('common.error'));
                return;
            }

            setLoading(true);
            const result = await Auth.resetPassword(email, otp, newPassword);
            setLoading(false);

            if (!result.success) {
                showError(result.message || t('common.error'));
            } else {
                showSuccess(t('common.success'));
                // Auth.resetPassword redirects to /login on success
            }
        });

    })();
</script>
{% endblock %}
