{% extends "base.html" %}

{% block title %}Health Advisor — Forgot Password{% endblock %}

{% block content %}
<div class="auth-wrap">

    <!-- Blobs -->
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <!-- Top Controls -->
    <div class="top-controls">
        <button class="toggle-btn" onclick="toggleLanguage()">
            <span id="lang-label">AR</span>
        </button>
        <button class="toggle-btn" onclick="toggleTheme()">
            <i id="theme-icon" class="fa-solid fa-moon text-sm"></i>
        </button>
    </div>

    <!-- Card -->
    <div class="card auth-card anim-card-in" style="text-align:center">

        <!-- Logo ring -->
        <div style="display:flex;justify-content:center;margin-bottom:20px" class="anim-logo-in">
            <div class="logo-ring">
                <i class="fa-solid fa-key text-white" style="font-size:28px"></i>
            </div>
        </div>

        <!-- Title -->
        <h1 class="card-title anim-fade-up delay-2" data-i18n="forgot.title">Forgot Password</h1>
        <p class="card-subtitle anim-fade-up delay-3" data-i18n="forgot.subtitle">
            Enter your email to receive a reset code
        </p>

        <!-- Error -->
        <div id="error-msg" class="msg-error" style="text-align:start">
            <i class="fa-solid fa-circle-exclamation"></i>
            <span id="error-text"></span>
        </div>

        <!-- Success -->
        <div id="success-msg" class="msg-success" style="text-align:start">
            <i class="fa-solid fa-circle-check"></i>
            <span id="success-text"></span>
        </div>

        <!-- Form -->
        <form id="forgot-form" novalidate style="text-align:start">

            <!-- Email -->
            <div class="field-group anim-fade-up delay-3">
                <label class="field-label" for="email" data-i18n="forgot.email_label">Email Address</label>
                <div class="field-wrap">
                    <i class="fa-solid fa-envelope field-icon"></i>
                    <input id="email" type="email" name="email" class="field-input"
                        data-i18n-placeholder="auth.email_placeholder" placeholder="example@mail.com"
                        autocomplete="email" required />
                </div>
            </div>

            <!-- Submit -->
            <button type="submit" class="btn-primary anim-fade-up delay-4" id="forgot-btn" style="margin-top:8px">
                <span class="btn-text" data-i18n="forgot.send_btn">Send Reset Code</span>
                <div class="btn-spinner"></div>
            </button>

        </form>

        <!-- Back to login -->
        <div style="margin-top:20px" class="anim-fade-up delay-5">
            <a href="/login" class="back-link" style="justify-content:center">
                <i class="fa-solid fa-arrow-left rtl-flip"></i>
                <span data-i18n="forgot.back_login">Back to Login</span>
            </a>
        </div>

    </div>

    <!-- Copyright -->
    <p class="page-copyright anim-fade-up delay-6" data-i18n="auth.copyright">
        © 2026 Health Advisor
    </p>

</div>
{% endblock %}

{% block scripts %}
<script>
    (function () {
        // ── Sync toggles ──
        const lang = localStorage.getItem('lang') || 'en';
        const theme = localStorage.getItem('theme') || 'light';
        const langLabel = document.getElementById('lang-label');
        const themeIcon = document.getElementById('theme-icon');
        if (langLabel) langLabel.textContent = lang === 'ar' ? 'EN' : 'AR';
        if (themeIcon) {
            themeIcon.classList.toggle('fa-moon', theme !== 'dark');
            themeIcon.classList.toggle('fa-sun', theme === 'dark');
        }

        // ── Message helpers ──
        function showError(msg) {
            document.getElementById('success-msg').classList.remove('show');
            document.getElementById('error-text').textContent = msg;
            document.getElementById('error-msg').classList.add('show');
        }

        function showSuccess(msg) {
            document.getElementById('error-msg').classList.remove('show');
            document.getElementById('success-text').textContent = msg;
            document.getElementById('success-msg').classList.add('show');
        }

        function hideMessages() {
            document.getElementById('error-msg').classList.remove('show');
            document.getElementById('success-msg').classList.remove('show');
        }

        // ── Loading state ──
        function setLoading(state) {
            const btn = document.getElementById('forgot-btn');
            btn.disabled = state;
            btn.classList.toggle('btn-loading', state);
        }

        // ── Form submit ──
        document.getElementById('forgot-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            hideMessages();

            const email = document.getElementById('email').value.trim();

            if (!email || !email.includes('@')) {
                showError(t('auth.email_error'));
                return;
            }

            setLoading(true);
            const result = await Auth.forgotPassword(email);
            setLoading(false);

            if (!result.success) {
                showError(result.message || t('common.error'));
            } else {
                showSuccess(t('common.success'));
                // Auth.forgotPassword redirects to /reset-password?email=... on success
            }
        });

    })();
</script>
{% endblock %}
